name: Build & Release

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish (self-contained exe)
        run: >
          dotnet publish AtolGenerator.csproj
          -c Release
          -r win-x86
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/

      - name: Upload artifact (всегда)
        uses: actions/upload-artifact@v4
        with:
          name: AtolGenerator-exe
          path: publish/AtolGenerator.exe

      - name: Create Release (только при теге v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: publish/AtolGenerator.exe
          name: АТОЛ Чек-генератор ${{ github.ref_name }}
          body: |
            ## Скачать и запустить

            1. Нажмите **AtolGenerator.exe** ниже
            2. Запустите — установка не нужна

            **Требования:** Windows 10/11 x64
