name: Build & Release

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish (self-contained exe)
        run: >
          dotnet publish AtolGenerator.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/

      - name: Get version
        id: version
        run: echo "tag=$(git describe --tags --always)" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AtolGenerator-${{ steps.version.outputs.tag }}
          path: publish/AtolGenerator.exe

      - name: Create Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/AtolGenerator.exe
          name: Release ${{ github.ref_name }}
          body: |
            ## АТОЛ Чек-генератор ${{ github.ref_name }}

            ### Установка
            Скачайте `AtolGenerator.exe` и запустите — установка не требуется.

            ### Требования
            - Windows 10/11 x64
            - .NET 8 не нужен (встроен в exe)
